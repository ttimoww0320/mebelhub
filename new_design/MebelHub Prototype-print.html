<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MebelHub — print</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0A0D12; color: #E8E6E1;
    font-family: 'Inter', -apple-system, sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased;
    -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  button, input, select, textarea { font-family: inherit; }
  a { color: inherit; text-decoration: none; }
  h1, h2, h3, h4, p { margin: 0; }
  select { appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23E4B668' stroke-width='1.2' fill='none'/></svg>"); background-repeat: no-repeat; background-position: right 14px center; padding-right: 36px !important; }

  /* Print page layout — each SPA "route" becomes its own sheet */
  .print-page {
    width: 1280px;
    margin: 0 auto 40px;
    background: #0A0D12;
    page-break-after: always;
    break-after: page;
    overflow: hidden;
  }
  .print-page:last-child { page-break-after: auto; break-after: auto; }
  .print-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #C9A35A;
    padding: 12px 24px;
    border-bottom: 1px solid rgba(201,163,90,0.2);
    text-transform: uppercase;
  }

  @page {
    size: 1400px 1800px;
    margin: 20px;
  }

  @media print {
    body { background: #0A0D12 !important; }
    .print-page {
      width: 100%;
      margin: 0 0 0 0;
      box-shadow: none;
    }
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="proto/data.jsx"></script>
<script type="text/babel" src="proto/work-illustrations.jsx"></script>
<script type="text/babel" src="proto/shared.jsx"></script>
<script type="text/babel" src="proto/page-home.jsx"></script>
<script type="text/babel" src="proto/page-masters.jsx"></script>
<script type="text/babel" src="proto/page-order-dashboard.jsx"></script>

<script type="text/babel">
const PAGES = [
  { id: 'home',         label: '01 — Главная',          render: (nav) => <HomePage onNav={nav}/> },
  { id: 'masters',      label: '02 — Каталог мастеров',  render: (nav) => <MastersPage onNav={nav}/> },
  { id: 'master:m01',   label: '03 — Страница мастера',  render: (nav) => <MasterPage masterId="m01" onNav={nav}/> },
  { id: 'works',        label: '04 — Работы',            render: (nav) => <WorksPage onNav={nav}/> },
  { id: 'order',        label: '05 — Разместить заказ',  render: (nav) => <OrderPage onNav={nav}/> },
  { id: 'dashboard',    label: '06 — Кабинет заказчика', render: (nav) => <DashboardPage onNav={nav}/> },
  { id: 'chat:m01',     label: '07 — Чат с мастером',    render: (nav) => <ChatPage masterId="m01" onNav={nav}/> },
];

const PrintApp = () => {
  const noop = () => {};
  return (
    <div style={{ background: mhTheme.bg, color: mhTheme.text }}>
      {PAGES.map(p => (
        <section key={p.id} className="print-page">
          <div className="print-label">{p.label}</div>
          <MHNav current={p.id.split(':')[0]} onNav={noop} onOrder={noop}/>
          {p.render(noop)}
          <MHFooter/>
        </section>
      ))}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp/>);

// Auto-print after everything is ready
(async () => {
  try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch(e) {}
  // Wait for React tree + Babel transforms to settle
  await new Promise(r => setTimeout(r, 1500));
  window.print();
})();
</script>
</body>
</html>
