<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MebelHub — Design Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: 'Inter Tight', -apple-system, sans-serif; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  button:focus { outline: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="variations/atelier.jsx"></script>
<script type="text/babel" src="variations/blueprint.jsx"></script>
<script type="text/babel" src="variations/obsidian.jsx"></script>

<script type="text/babel">
const App = () => (
  <DesignCanvas>
    <DCSection id="hero" title="MebelHub · Homepage Hero" subtitle="Три направления премиум-редизайна. Каждое — полноэкранный hero-блок с уникальной анимацией, типографикой и UX-подходом к поиску. Выбранное направление развернём в полный кликабельный прототип со всеми страницами.">
      <DCArtboard id="atelier" label="01 · Atelier — Editorial serif, isometric assembly" width={1280} height={820}>
        <AtelierHero/>
      </DCArtboard>
      <DCArtboard id="blueprint" label="02 · Blueprint — Technical, drafted, precise" width={1280} height={820}>
        <BlueprintHero/>
      </DCArtboard>
      <DCArtboard id="obsidian" label="03 · Obsidian — Cinematic, atmospheric, minimal" width={1280} height={820}>
        <ObsidianHero/>
      </DCArtboard>
    </DCSection>

    <DCSection id="notes" title="Дизайн-система" subtitle="Общие принципы всех направлений">
      <DCArtboard id="palette" label="Палитра · Графит + золото" width={600} height={420}>
        <div style={{width:'100%',height:'100%',background:'#0A0D12',color:'#E8E6E1',padding:32,fontFamily:'Inter Tight'}}>
          <div style={{fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:'#E4B668',marginBottom:20}}>ЦВЕТА</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            {[
              ['#05060a','Obsidian','bg primary'],
              ['#0A0D12','Graphite','bg canvas'],
              ['#1C2128','Smoke','bg elevated'],
              ['#2A3038','Steel','borders'],
              ['#E8E6E1','Bone','text primary'],
              ['#9FA3AB','Fog','text mute'],
              ['#E4B668','Gold 500','accent primary'],
              ['#A07832','Gold 700','accent dark'],
            ].map(([hex,name,role]) => (
              <div key={hex} style={{display:'flex',alignItems:'center',gap:12}}>
                <div style={{width:48,height:48,background:hex,border:'1px solid rgba(255,255,255,0.08)'}}/>
                <div>
                  <div style={{fontSize:13,fontWeight:500}}>{name}</div>
                  <div style={{fontSize:10,fontFamily:'JetBrains Mono',color:'#9FA3AB',letterSpacing:'0.04em'}}>{hex} · {role}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </DCArtboard>
      <DCArtboard id="type" label="Типографика · Fraunces + Inter Tight" width={600} height={420}>
        <div style={{width:'100%',height:'100%',background:'#0A0D12',color:'#E8E6E1',padding:32,fontFamily:'Inter Tight'}}>
          <div style={{fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:'#E4B668',marginBottom:20}}>ТИПОГРАФИКА</div>
          <div style={{fontFamily:'"Fraunces",serif',fontSize:54,fontWeight:300,lineHeight:0.95,letterSpacing:'-0.03em'}}>
            Мастерство<br/><em style={{color:'#E4B668'}}>на заказ</em>
          </div>
          <div style={{marginTop:20,fontSize:12,fontFamily:'JetBrains Mono',color:'#9FA3AB',letterSpacing:'0.06em'}}>
            Fraunces · Display serif · 300 &amp; italic
          </div>
          <div style={{marginTop:28,fontSize:15,lineHeight:1.55,color:'rgba(232,230,225,0.85)'}}>
            Опишите вашу идею — и получите предложения от проверенных мебельщиков.
            Не ищите мастера. Мастер найдёт вас.
          </div>
          <div style={{marginTop:12,fontSize:12,fontFamily:'JetBrains Mono',color:'#9FA3AB',letterSpacing:'0.06em'}}>
            Inter Tight · UI · 400 / 500 / 600
          </div>
          <div style={{marginTop:20,fontFamily:'JetBrains Mono',fontSize:11,color:'#E4B668',letterSpacing:'0.1em'}}>
            DWG · 001 · REV.04 · 2026
          </div>
          <div style={{marginTop:6,fontSize:10,fontFamily:'JetBrains Mono',color:'#9FA3AB',letterSpacing:'0.06em'}}>
            JetBrains Mono · metadata / labels
          </div>
        </div>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
